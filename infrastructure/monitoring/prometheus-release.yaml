apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: prometheus
      version: ">=28.16.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-helm-repo
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: prometheus-config
      valuesKey: values.yaml

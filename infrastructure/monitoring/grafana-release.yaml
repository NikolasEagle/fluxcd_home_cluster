apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: ">=10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana-helm-repo
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: grafana-config
      valuesKey: values.yaml

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: csi-driver-nfs
      version: ">=4.13.3"
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs-helm-repo
        namespace: flux-system
      interval: 1m
  values:
    kubeletDir: /var/lib/kubelet

    controller:
      name: csi-nfs-controller
      replicas: 1
      runOnMaster: false
      runOnControlPlane: true
      enableSnapshotter: false

    storageClass:
      create: false

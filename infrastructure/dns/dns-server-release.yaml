apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dns-server
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: technitium-dnsserver
      version: ">=1.8.0"
      sourceRef:
        kind: HelmRepository
        name: obeone-helm-repo
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: dns-config
      valuesKey: values.yaml

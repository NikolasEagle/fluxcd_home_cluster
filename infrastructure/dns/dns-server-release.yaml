apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dns-server
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: technitium-dnsserver
      version: ">=1.8.0"
      sourceRef:
        kind: HelmRepository
        name: obeone-helm-repo
        namespace: flux-system
      interval: 1m
  values:
    service:
      main:
        ports:
          http:
            enabled: true
            port: 5380
            targetPort: 5380
            protocol: TCP
          https:
            enabled: false
            port: 443
            targetPort: 53443
          dns-udp:
            enabled: true
            port: 53
            protocol: UDP
          dns-tcp:
            enabled: true
            port: 53
            protocol: TCP
          dhcp:
            enabled: true
            port: 67
            protocol: UDP
          dot:
            enabled: true
            port: 853
            protocol: TCP
          doh-reverse:
            enabled: true
            port: 8053
            protocol: TCP

    ingress:
      main:
        enabled: true
        annotations: {}
        hosts:
          - host: dns.home
            paths:
              - path: /
                pathType: Prefix
        ingressClassName: "traefik"
        tls: []

    persistence:
      config:
        enabled: true
        type: pvc
        existingClaim: "dns-pvc"
        mountPath: /etc/dns

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: repositories
    - name: proxy
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/production
  prune: true
  timeout: 5m
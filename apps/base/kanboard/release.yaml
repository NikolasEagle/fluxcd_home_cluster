apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kanboard
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: kanboard
      version: ">=1.2.3"
      sourceRef:
        kind: HelmRepository
        name: kanboard-helm-repo
        namespace: flux-system
      interval: 1m
  values:
    application:
      persistence:
        enabled: true
        persistentVolumeClaim:
          name: kanboard-data-claim
          create: false
      env: []
        
    service:
      enabled: true
      type: ClusterIP
      port: 8080

    ingress:
      enabled: true
      annotations: {}
      ingressClassName: "traefik"
      host: kanboard.home
      tls: ~

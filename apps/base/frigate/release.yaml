apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: frigate
      version: ">=7.8.0"
      sourceRef:
        kind: HelmRepository
        name: frigate-helm-repo
        namespace: flux-system
      interval: 1m
  values:
    strategyType: Recreate

    env:
      TZ: UTC

    envFromSecrets:
      - frigate-rtsp-credentials

    shmSize: 1Gi

    tmpfs:
      enabled: true
      sizeLimit: 1Gi

    config: |
      tls:
        enabled: false
      mqtt:
        host: 152.152.152.4
        port: 1883

      cameras:
        front_door:
          ffmpeg:
            inputs:
              - path: rtsp://{FRIGATE_RTSP_USERNAME}:{FRIGATE_RTSP_PASSWORD}@152.152.152.4:554/cam/realmonitor?channel=1&subtype=1
                roles:
                  - record
          
          record:
            enabled: true
            retain:
              days: 7
              mode: all
        

      detect:
        enabled: false
      birdseye:
        enabled: false
      rtmp: 
        enabled: false

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations: {}
      hosts:
        - host: frigate.home
          paths:
            - path: "/"
              portName: http-auth

    service:
      type: ClusterIP
      port: 5000

    persistence:
      config:
        enabled: true
        storageClass: "localstorage"
        existingClaim: frigate-config-pvc
        accessMode: ReadWriteMany
        size: 100Mi
        skipuninstall: true
        ephemeralWritableConfigYaml: true

      media:
        enabled: true
        storageClass: "localstorage"
        existingClaim: frigate-media-pvc
        accessMode: ReadWriteMany
        size: 20Gi
        skipuninstall: true

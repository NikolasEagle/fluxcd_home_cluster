apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: frigate
      version: ">=7.8.0"
      sourceRef:
        kind: HelmRepository
        name: frigate-helm-repo
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: frigate-config
      valuesKey: values.yaml
